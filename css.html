<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的页面</title>
    <style>
        /* ===== 全局样式 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html {
            scroll-behavior: smooth;
            background: #08080e;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: #08080e;
            color: #f0f0f5;
            overflow-x: hidden;
        }
        .bg-gradient-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
            pointer-events: none;
            background: radial-gradient(ellipse at 30% 20%, rgba(0, 180, 255, 0.08) 0%, transparent 60%), radial-gradient(ellipse at 70% 80%, rgba(120, 60, 235, 0.08) 0%, transparent 60%), #08080e;
        }
        .blur-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 2;
            pointer-events: none;
            backdrop-filter: blur(3px);
            background: rgba(8, 8, 14, 0.05);
        }
        .content-wrapper {
            position: relative;
            z-index: 3;
        }
        .main-container {
            max-width: 1400px;
            margin: 0 auto;
            padding-left: 40px;
            padding-right: 40px;
        }
        @media (max-width:768px) {
            .main-container {
                padding-left: 24px;
                padding-right: 24px;
            }
        }
        .glass-card {
            background: rgba(14, 14, 26, 0.65);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 28px;
            transition: border-color 0.3s, box-shadow 0.3s;
        }
        .glass-card:hover {
            border-color: rgba(0, 212, 255, 0.12);
            box-shadow: 0 20px 60px -20px rgba(0, 180, 255, 0.10);
        }
        .section-label {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }
        .section-label .line {
            width: 32px;
            height: 1.5px;
            background: rgba(0, 212, 255, 0.35);
            border-radius: 4px;
        }
        .section-label .text {
            font-size: 12px;
            font-weight: 300;
            letter-spacing: 0.2em;
            color: rgba(255, 255, 255, 0.28);
            text-transform: uppercase;
        }
        .fade-up {
            opacity: 0;
            transform: translateY(32px);
            transition: opacity 0.7s ease, transform 0.7s ease;
        }
        .fade-up.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* ===== 导航 ===== */
        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 50;
            padding: 12px 0;
            transition: background 0.4s, border-color 0.4s;
        }
        nav.scrolled {
            background: rgba(8, 8, 14, 0.80);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
        }
        .nav-inner {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
        }
        .logo-main {
            font-size: 22px;
            font-weight: 300;
            letter-spacing: 0.08em;
            color: rgba(255, 255, 255, 0.78);
        }
        .logo-sub {
            font-size: 10px;
            font-weight: 300;
            letter-spacing: 0.25em;
            color: rgba(0, 212, 255, 0.45);
            text-transform: uppercase;
            display: none;
        }
        @media (min-width:640px) {
            .logo-sub {
                display: inline;
            }
        }
        .nav-links {
            display: none;
            gap: 40px;
        }
        @media (min-width:768px) {
            .nav-links {
                display: flex;
            }
        }
        .nav-links a {
            text-decoration: none;
            font-size: 14px;
            font-weight: 300;
            letter-spacing: 0.05em;
            color: rgba(255, 255, 255, 0.45);
            transition: color 0.3s;
            position: relative;
        }
        .nav-links a::after {
            content: '';
            display: block;
            width: 0;
            height: 1.5px;
            background: linear-gradient(90deg, #00d4ff, #7c3aed);
            transition: width 0.35s cubic-bezier(.22, 1, .36, 1);
            border-radius: 4px;
            margin-top: 2px;
        }
        .nav-links a:hover {
            color: rgba(255, 255, 255, 0.85);
        }
        .nav-links a:hover::after {
            width: 100%;
        }
        .nav-cta {
            padding: 8px 20px;
            border-radius: 100px;
            font-size: 12px;
            font-weight: 500;
            letter-spacing: 0.05em;
            color: white;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.06);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.3s;
            cursor: pointer;
        }
        .nav-cta:hover {
            background: rgba(255, 255, 255, 0.07);
            border-color: rgba(255, 255, 255, 0.10);
            transform: translateY(-1px);
            box-shadow: 0 8px 28px -12px rgba(0, 180, 255, 0.25);
        }

        /* ===== Hero ===== */
        .hero {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 0 24px;
            position: relative;
        }
        .hero-badge {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 6px 18px;
            border-radius: 100px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            margin-bottom: 40px;
        }
        .hero-badge .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #00d4ff;
            animation: pulse-dot 2s infinite;
        }
        @keyframes pulse-dot {
            0%,
            100% {
                opacity: 0.6;
                transform: scale(1);
            }
            50% {
                opacity: 1;
                transform: scale(1.2);
            }
        }
        .hero-badge span {
            font-size: 12px;
            font-weight: 300;
            letter-spacing: 0.12em;
            color: rgba(255, 255, 255, 0.35);
            text-transform: uppercase;
        }
        .hero-title {
            font-size: clamp(3rem, 12vw, 8rem);
            font-weight: 200;
            letter-spacing: -0.02em;
            line-height: 0.92;
            color: white;
            position: relative;
        }
        .hero-title .glow-text {
            background: linear-gradient(180deg, #fff 0%, rgba(255, 255, 255, 0.5) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 30px rgba(0, 212, 255, 0.2));
        }
        .hero-title strong {
            font-weight: 500;
        }
        .hero-sub {
            font-size: clamp(1rem, 2.5vw, 1.8rem);
            font-weight: 200;
            letter-spacing: 0.06em;
            color: rgba(255, 255, 255, 0.25);
            margin-top: 12px;
        }
        .hero-desc {
            font-size: 16px;
            font-weight: 300;
            color: rgba(255, 255, 255, 0.28);
            max-width: 540px;
            margin-top: 28px;
            line-height: 1.6;
        }
        .hero-desc .sep {
            display: inline-block;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.15);
            margin: 0 12px;
            vertical-align: middle;
        }
        .hero-buttons {
            margin-top: 44px;
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .btn-primary,
        .btn-secondary {
            padding: 12px 32px;
            border-radius: 100px;
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 0.05em;
            text-decoration: none;
            transition: all 0.3s;
            cursor: pointer;
        }
        .btn-primary {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: white;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-primary:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.12);
            transform: translateY(-2px);
            box-shadow: 0 12px 40px -16px rgba(0, 180, 255, 0.25);
        }
        .btn-secondary {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.04);
            color: rgba(255, 255, 255, 0.35);
        }
        .btn-secondary:hover {
            color: rgba(255, 255, 255, 0.65);
            border-color: rgba(255, 255, 255, 0.10);
        }
        .scroll-hint {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            animation: float-down 2.5s infinite;
        }
        .scroll-hint span {
            font-size: 10px;
            letter-spacing: 0.2em;
            color: rgba(255, 255, 255, 0.12);
            text-transform: uppercase;
        }
        .scroll-hint svg {
            width: 20px;
            height: 20px;
            color: rgba(255, 255, 255, 0.12);
        }
        @keyframes float-down {
            0%,
            100% {
                transform: translateX(-50%) translateY(0);
            }
            50% {
                transform: translateX(-50%) translateY(8px);
            }
        }

        /* ===== About ===== */
        .about-section {
            padding: 120px 0;
        }
        .about-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 40px;
            align-items: center;
        }
        @media (min-width:1024px) {
            .about-grid {
                grid-template-columns: 0.8fr 1.2fr;
            }
        }
        .about-text h2 {
            font-size: 32px;
            font-weight: 300;
            color: rgba(255, 255, 255, 0.85);
            line-height: 1.2;
            margin-bottom: 16px;
        }
        .about-text h2 .highlight {
            color: rgba(0, 212, 255, 0.65);
        }
        .about-text p {
            font-size: 16px;
            font-weight: 300;
            color: rgba(255, 255, 255, 0.30);
            line-height: 1.7;
            max-width: 540px;
        }
        .about-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-top: 20px;
        }
        .about-meta .meta-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            font-weight: 300;
            color: rgba(255, 255, 255, 0.25);
        }
        .about-meta .meta-item svg {
            width: 16px;
            height: 16px;
            opacity: 0.5;
        }

        /* ===== Projects ===== */
        .projects-section {
            padding: 100px 0;
        }
        .projects-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 24px;
        }
        @media (min-width:640px) {
            .projects-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        @media (min-width:1024px) {
            .projects-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }
        .project-card {
            padding: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .project-media {
            width: 100%;
            overflow: hidden;
            background: #0c0c18;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 28px 28px 0 0;
        }
        .project-media img,
        .project-media video {
            width: 100%;
            height: 200px;
            object-fit: cover;
            display: block;
        }
        .project-info {
            padding: 28px 24px;
            flex: 1;
        }
        .project-info h3 {
            font-size: 20px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.75);
            margin-bottom: 6px;
        }
        .project-info p {
            font-size: 14px;
            font-weight: 300;
            color: rgba(255, 255, 255, 0.28);
            line-height: 1.6;
            margin: 0;
        }
        .project-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            padding: 16px 24px 24px;
            border-top: 1px solid rgba(255, 255, 255, 0.03);
        }
        .project-tags span {
            padding: 4px 12px;
            border-radius: 100px;
            font-size: 10px;
            font-weight: 300;
            letter-spacing: 0.05em;
            color: rgba(255, 255, 255, 0.22);
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        /* ===== Skills ===== */
        .skills-section {
            padding: 100px 0;
        }
        .skills-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            margin-top: 40px;
        }
        @media (min-width:640px) {
            .skills-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        @media (min-width:1024px) {
            .skills-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }
        .skill-card {
            padding: 28px 24px;
        }
        .skill-row {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 16px;
        }
        .skill-icon {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.07), rgba(124, 58, 237, 0.04));
            border: 1px solid rgba(255, 255, 255, 0.03);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .skill-icon svg {
            width: 20px;
            height: 20px;
            color: rgba(0, 212, 255, 0.50);
        }
        .skill-info {
            flex: 1;
        }
        .skill-info .skill-name {
            display: flex;
            justify-content: space-between;
            font-size: 15px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.75);
        }
        .skill-info .skill-percent {
            font-size: 12px;
            font-weight: 300;
            color: rgba(255, 255, 255, 0.18);
        }
        .skill-bar {
            margin-top: 6px;
            height: 3px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 8px;
            overflow: hidden;
        }
        .skill-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, rgba(0, 212, 255, 0.45), rgba(124, 58, 237, 0.35));
            border-radius: 8px;
            width: 0;
            transition: width 1.2s cubic-bezier(.22, 1, .36, 1);
        }
        .skill-card p {
            font-size: 13px;
            font-weight: 300;
            color: rgba(255, 255, 255, 0.22);
        }

        /* ===== 雷达图 ===== */
        .radar-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 30px 0 10px;
        }
        .radar-container {
            position: relative;
            width: 300px;
            height: 300px;
        }
        .radar-container canvas {
            width: 100%;
            height: 100%;
            display: block;
        }
        .radar-legend {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            margin-top: 12px;
        }
        .radar-legend span {
            font-size: 12px;
            font-weight: 300;
            color: rgba(255, 255, 255, 0.4);
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .radar-legend span::before {
            content: '';
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(0, 212, 255, 0.6);
        }

        /* ===== Contact ===== */
        .contact-section {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 80px 24px;
        }
        .contact-card {
            padding: 48px 36px;
            text-align: center;
            max-width: 800px;
            width: 100%;
        }
        .contact-card h2 {
            font-size: 36px;
            font-weight: 300;
            color: rgba(255, 255, 255, 0.85);
            margin-bottom: 12px;
        }
        .contact-card .lead {
            font-size: 16px;
            font-weight: 300;
            color: rgba(255, 255, 255, 0.25);
            margin-bottom: 40px;
        }
        .contact-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
            max-width: 600px;
            margin: 0 auto 40px;
        }
        @media (min-width:640px) {
            .contact-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        .contact-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 18px;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.015);
            border: 1px solid rgba(255, 255, 255, 0.03);
            text-decoration: none;
            transition: all 0.3s;
        }
        .contact-item:hover {
            background: rgba(255, 255, 255, 0.025);
            border-color: rgba(255, 255, 255, 0.06);
        }
        .contact-item-icon {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: rgba(0, 212, 255, 0.05);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .contact-item-icon svg {
            width: 16px;
            height: 16px;
            color: rgba(0, 212, 255, 0.45);
        }
        .contact-item-text {
            text-align: left;
        }
        .contact-item-text .label {
            font-size: 11px;
            font-weight: 300;
            color: rgba(255, 255, 255, 0.15);
        }
        .contact-item-text .value {
            font-size: 14px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.55);
        }
        .footer-note {
            border-top: 1px solid rgba(255, 255, 255, 0.03);
            padding-top: 24px;
            font-size: 11px;
            font-weight: 300;
            color: rgba(255, 255, 255, 0.10);
            letter-spacing: 0.05em;
        }
        @media (max-width:480px) {
            .hero-title {
                font-size: 2.8rem;
            }
            .glass-card {
                border-radius: 20px;
            }
        }

        /* ===== 登录弹窗 ===== */
        .login-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s, visibility 0.3s;
        }
        .login-overlay.active {
            opacity: 1;
            visibility: visible;
        }
        .login-box {
            background: #141420;
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 24px;
            padding: 40px 36px;
            width: 340px;
            max-width: 90vw;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.6);
            text-align: center;
            position: relative;
        }
        .login-box h2 {
            font-weight: 300;
            font-size: 24px;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 8px;
        }
        .login-box .sub {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.2);
            margin-bottom: 28px;
        }
        .login-box input {
            width: 100%;
            padding: 10px 14px;
            margin-bottom: 12px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 12px;
            color: white;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }
        .login-box input:focus {
            border-color: rgba(0, 212, 255, 0.3);
        }
        .login-box input::placeholder {
            color: rgba(255, 255, 255, 0.15);
        }
        .login-box .btn-row {
            display: flex;
            gap: 10px;
            margin-top: 8px;
        }
        .login-box .btn-row button {
            flex: 1;
            padding: 10px 0;
            border-radius: 12px;
            border: none;
            font-size: 14px;
            font-weight: 400;
            cursor: pointer;
            transition: all 0.2s;
        }
        .login-box .btn-admin {
            background: rgba(0, 212, 255, 0.15);
            color: #00d4ff;
            border: 1px solid rgba(0, 212, 255, 0.2);
        }
        .login-box .btn-admin:hover {
            background: rgba(0, 212, 255, 0.2);
        }
        .login-box .btn-guest {
            background: rgba(255, 255, 255, 0.04);
            color: rgba(255, 255, 255, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.06);
        }
        .login-box .btn-guest:hover {
            background: rgba(255, 255, 255, 0.07);
        }
        .login-box .btn-register {
            background: transparent;
            color: rgba(255, 255, 255, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.04);
            margin-top: 4px;
            width: 100%;
        }
        .login-box .btn-register:hover {
            color: rgba(255, 255, 255, 0.5);
        }
        .login-box .error-msg {
            font-size: 12px;
            color: #ff6b6b;
            margin: 6px 0 0;
            height: 16px;
        }
        .login-box .close-btn {
            position: absolute;
            top: 12px;
            right: 16px;
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.3);
            font-size: 20px;
            cursor: pointer;
        }
        .login-box .close-btn:hover {
            color: white;
        }

        /* ===== 粒子画布层 ===== */
        #particleCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
            pointer-events: none;
            opacity: 0.4;
        }

        /* ===== 角落科技装饰线 ===== */
        .corner-line {
            position: fixed;
            width: 60px;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(0, 212, 255, 0.2));
            z-index: 3;
            pointer-events: none;
        }
        .corner-line.top-left {
            top: 30px;
            left: 30px;
        }
        .corner-line.top-right {
            top: 30px;
            right: 30px;
